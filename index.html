<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buku Kas Digital — Kelompok 2</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── HEADER / NAV ── -->
  <header>
    <div class="nav-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="18" height="18" rx="3" stroke="white" stroke-width="1.5" fill="none"/>
            <path d="M8 9h8M8 12h6M8 15h4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="logo-text">Buku Kas <span>Digital</span></span>
      </div>
      <span class="badge-kelompok">Kelompok 2</span>
    </div>
  </header>

  <!-- ── MAIN CONTENT ── -->
  <main>

    <!-- Page Title -->
    <div class="page-title">
      <h1>Catatan Keuangan</h1>
      <p id="dateLabel">Memuat tanggal...</p>
    </div>

    <!-- Ringkasan / Summary Cards -->
    <div class="summary-grid">
      <div class="card">
        <div class="card-label"><span class="dot dot-gold"></span>Saldo</div>
        <div class="card-value balance-positive" id="saldo">Rp 0</div>
        <div class="card-sub" id="txCount">0 transaksi</div>
      </div>
      <div class="card">
        <div class="card-label"><span class="dot dot-green"></span>Pemasukan</div>
        <div class="card-value income" id="totalIncome">Rp 0</div>
        <div class="card-sub" id="incomeCount">0 catatan</div>
      </div>
      <div class="card">
        <div class="card-label"><span class="dot dot-red"></span>Pengeluaran</div>
        <div class="card-value expense" id="totalExpense">Rp 0</div>
        <div class="card-sub" id="expenseCount">0 catatan</div>
      </div>
    </div>

    <!-- Form + List Grid -->
    <div class="content-grid">

      <!-- Form Tambah Transaksi -->
      <div class="form-card">
        <div class="form-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" style="color: var(--accent)">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          <h2>Tambah Transaksi</h2>
        </div>

        <div class="form-body">
          <!-- Toggle Pemasukan / Pengeluaran -->
          <div class="type-toggle">
            <button class="type-btn active-income" id="btnIncome"
                    onclick="setType('income')">+ Pemasukan</button>
            <button class="type-btn" id="btnExpense"
                    onclick="setType('expense')">− Pengeluaran</button>
          </div>

          <div class="field">
            <label for="deskripsi">Deskripsi</label>
            <input type="text" id="deskripsi"
                   placeholder="Contoh: Gaji bulan ini" maxlength="60">
          </div>

          <div class="field">
            <label for="jumlah">Jumlah (Rp)</label>
            <input type="number" id="jumlah" placeholder="0" min="0">
          </div>

          <div class="field">
            <label for="kategori">Kategori</label>
            <select id="kategori">
              <option value="" disabled selected>Pilih kategori</option>
            </select>
          </div>

          <div class="field">
            <label for="tanggal">Tanggal</label>
            <input type="date" id="tanggal">
          </div>

          <button class="btn-submit" onclick="tambahTransaksi()">
            Simpan Transaksi
          </button>
        </div>
      </div>

      <!-- Riwayat Transaksi -->
      <div class="list-panel">
        <div class="list-header">
          <h2>Riwayat</h2>
          <div class="filter-row">
            <button class="filter-btn active" onclick="setFilter('all', this)">Semua</button>
            <button class="filter-btn" onclick="setFilter('income', this)">Masuk</button>
            <button class="filter-btn" onclick="setFilter('expense', this)">Keluar</button>
          </div>
        </div>

        <!-- Search -->
        <div class="search-box">
          <div class="search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput"
                   placeholder="Cari transaksi..." oninput="renderList()">
          </div>
        </div>

        <!-- Daftar transaksi (diisi oleh JS) -->
        <div class="list-body" id="listBody"></div>
      </div>

    </div>
  </main>

  <!-- ── FOOTER ── -->
  <footer>
    Buku Kas Digital &nbsp;·&nbsp; Kelompok 2 &nbsp;·&nbsp; Data tersimpan di perangkat Anda
  </footer>

  <!-- ── TOAST NOTIFIKASI ── -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
